name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable + dev)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Type check (mypy)
        run: mypy src
      - name: Tests
        # Coverage gate (branch=true + fail_under) lives in pyproject.toml
        # [tool.coverage.*], so this command enforces it without duplicating
        # the threshold here. Under-threshold coverage fails the job.
        run: pytest --cov=mcpscan --cov-report=term-missing

  security:
    name: security (SAST + SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: SAST (bandit)
        run: bandit -r src
      - name: SCA (pip-audit)
        run: pip-audit
