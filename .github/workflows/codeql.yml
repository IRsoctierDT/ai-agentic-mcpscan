name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # weekly, Monday 03:27 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    # CodeQL code scanning is free on public repos and requires GitHub Advanced
    # Security on private ones. Skip (neutral) while private; self-activates
    # automatically when the repo goes public. SAST is covered meanwhile by
    # bandit in ci.yml.
    if: ${{ github.event.repository.visibility == 'public' }}
    permissions:
      security-events: write # upload results to code scanning
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended
      # Python is interpreted — no build step (autobuild) is needed.
      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
