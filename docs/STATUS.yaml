# Sprint / ticket status tracker for AI Agentic MCPscan.
#
# Source of truth for delivery status. docs/STATUS.md is a human-readable view
# of this file — keep them in sync when a ticket changes state.
#
# Status vocabulary:
#   done       - implemented and backed by code + tests in THIS repo
#   done_doc   - the required artifact/sign-off exists in the repo, but final
#                acceptance is a human/process step (we can confirm the artifact,
#                not that the external action was performed)
#   partial    - the repo-verifiable portion is done + tested, but part of the
#                acceptance needs an external environment we can't inspect here
#   pending    - not yet completed
#   unverified - acceptance needs an environment we can't inspect from the repo
#                (e.g. a real lab run, a published PyPI release)
#
# `evidence` lists repo paths that substantiate the status. Tickets trace to
# requirements in docs/SPEC.md; see docs/BACKLOG.md for full acceptance criteria.

